<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>CultureGO – Nyon</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<style>
* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

:root {
  --nav-hauteur: 60px;
  --bottom-nav-hauteur: 72px;
  --couleur-fond: #0f1117;
  --couleur-surface: #1a1d27;
  --couleur-surface-2: #242736;
  --couleur-texte: #e8eaf0;
  --couleur-texte-doux: #8892a4;
  --couleur-accent: #4f8ef7;
  --couleur-accent-hover: #6ba3ff;
  --rayon: 12px;
  --rayon-lg: 20px;
  font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
  -webkit-tap-highlight-color: transparent;
}

html, body {
  overscroll-behavior: none;
}

body {
  background: var(--couleur-fond);
  color: var(--couleur-texte);
  min-height: 100vh;
  min-height: 100dvh;
}

#root {
  min-height: 100vh;
  min-height: 100dvh;
  display: flex;
  flex-direction: column;
}

/* ─── NAVIGATION ─────────────────────────────────── */

.navigation {
  height: var(--nav-hauteur);
  background: var(--couleur-surface);
  border-bottom: 1px solid rgba(255, 255, 255, 0.08);
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 24px;
  position: sticky;
  top: 0;
  z-index: 1000;
  backdrop-filter: blur(10px);
}

.nav-logo {
  display: flex;
  align-items: center;
  gap: 10px;
  font-size: 18px;
  font-weight: 700;
  color: var(--couleur-texte);
}

.nav-logo-icon {
  font-size: 22px;
}

.nav-logo-ville {
  color: var(--couleur-accent);
}

.nav-liens {
  display: flex;
  gap: 8px;
  flex: 1;
  justify-content: center;
}

@media (max-width: 640px) {
  .nav-liens { display: none; }

  .navigation {
    padding: 0 16px;
  }

  .nav-logo-texte {
    font-size: 15px;
  }
}

.nav-lien {
  text-decoration: none;
  color: var(--couleur-texte-doux);
  padding: 8px 16px;
  border-radius: 8px;
  font-size: 14px;
  font-weight: 500;
  transition: all 0.2s;
}

.nav-lien:hover {
  color: var(--couleur-texte);
  background: rgba(255, 255, 255, 0.06);
}

.nav-lien.actif {
  color: var(--couleur-accent);
  background: rgba(79, 142, 247, 0.12);
}

/* ─── APP LAYOUT ─────────────────────────────────── */

.app {
  display: flex;
  flex-direction: column;
  min-height: 100vh;
  min-height: 100dvh;
}

.app-contenu {
  flex: 1;
  display: flex;
  flex-direction: column;
}

/* ─── BOTTOM NAV (mobile only) ───────────────────── */

.bottom-nav {
  display: none;
}

@media (max-width: 640px) {
  .bottom-nav {
    display: flex;
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    height: var(--bottom-nav-hauteur);
    background: var(--couleur-surface);
    border-top: 1px solid rgba(255, 255, 255, 0.08);
    z-index: 1000;
    padding-bottom: env(safe-area-inset-bottom, 0);
  }

  .bottom-nav-lien {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 4px;
    text-decoration: none;
    color: var(--couleur-texte-doux);
    transition: color 0.2s;
    min-height: 44px;
  }

  .bottom-nav-lien.actif {
    color: var(--couleur-accent);
  }

  .bottom-nav-icone {
    font-size: 22px;
    line-height: 1;
  }

  .bottom-nav-label {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.3px;
  }

  .app-contenu {
    padding-bottom: var(--bottom-nav-hauteur);
  }
}

/* ─── CARTE (MAP) PAGE ───────────────────────────── */

.carte-page {
  flex: 1;
  display: flex;
  flex-direction: column;
}

.carte-info-banniere {
  background: rgba(79, 142, 247, 0.08);
  border-bottom: 1px solid rgba(79, 142, 247, 0.15);
  padding: 8px 20px;
  text-align: center;
  font-size: 14px;
  color: var(--couleur-accent);
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 6px;
}

.carte-filtre-serie {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
  justify-content: center;
}

.filtre-btn-sm {
  font-size: 11px;
  padding: 3px 10px;
}

.leaflet-map {
  flex: 1;
  min-height: calc(100dvh - var(--nav-hauteur) - 42px);
}

@media (max-width: 640px) {
  .leaflet-map {
    min-height: calc(100dvh - var(--nav-hauteur) - var(--bottom-nav-hauteur) - 42px);
  }
}

/* ─── MARQUEURS MAP ──────────────────────────────── */

.marqueur-lieu {
  width: 48px;
  height: 48px;
  background: var(--couleur-surface);
  border: 2px solid rgba(255, 255, 255, 0.15);
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  transition: transform 0.2s, border-color 0.2s;
  box-shadow: 0 4px 16px rgba(0, 0, 0, 0.4);
}

.marqueur-lieu:hover {
  transform: scale(1.15);
  border-color: var(--couleur-accent);
}

.marqueur-lieu.visite {
  border-color: #43a047;
  background: #1b3a1c;
}

.marqueur-emoji {
  font-size: 22px;
}

/* ─── POPUP MAP ──────────────────────────────────── */

.leaflet-popup-content-wrapper {
  background: var(--couleur-surface) !important;
  border: 1px solid rgba(255, 255, 255, 0.1) !important;
  border-radius: var(--rayon) !important;
  box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5) !important;
  color: var(--couleur-texte) !important;
  padding: 0 !important;
}

.leaflet-popup-tip {
  background: var(--couleur-surface) !important;
}

.leaflet-popup-content {
  margin: 0 !important;
}

.popup-contenu {
  padding: 16px;
  min-width: 200px;
}

.popup-titre {
  font-size: 16px;
  font-weight: 700;
  margin-bottom: 6px;
  color: var(--couleur-texte);
}

.popup-description {
  font-size: 13px;
  color: var(--couleur-texte-doux);
  margin-bottom: 10px;
  line-height: 1.4;
}

.popup-statut {
  font-size: 12px;
  margin-bottom: 6px;
}

.popup-statut.visite {
  color: #66bb6a;
}

.popup-cooldown {
  font-size: 12px;
  color: #ffb74d;
  margin-bottom: 8px;
}

.popup-btn {
  width: 100%;
  padding: 12px 16px;
  background: var(--couleur-accent);
  color: white;
  border: none;
  border-radius: 8px;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  transition: background 0.2s;
  min-height: 44px;
}

.popup-btn:hover:not(.desactive) {
  background: var(--couleur-accent-hover);
}

.popup-btn.desactive {
  background: var(--couleur-surface-2);
  color: var(--couleur-texte-doux);
  cursor: not-allowed;
}

/* ─── OUVERTURE PAGE ─────────────────────────────── */

.ouverture-page {
  min-height: calc(100vh - var(--nav-hauteur));
  background: radial-gradient(ellipse at top, #1a1f3c 0%, var(--couleur-fond) 70%);
  padding: 24px;
  display: flex;
  flex-direction: column;
  align-items: center;
}

.btn-retour {
  align-self: flex-start;
  background: none;
  border: 1px solid rgba(255, 255, 255, 0.12);
  color: var(--couleur-texte-doux);
  padding: 8px 16px;
  border-radius: 8px;
  cursor: pointer;
  font-size: 14px;
  transition: all 0.2s;
  margin-bottom: 24px;
}

.btn-retour:hover {
  border-color: rgba(255, 255, 255, 0.25);
  color: var(--couleur-texte);
}

.ouverture-titre {
  text-align: center;
  margin-bottom: 40px;
}

.ouverture-emoji {
  font-size: 48px;
  display: block;
  margin-bottom: 12px;
}

.ouverture-titre h1 {
  font-size: 32px;
  font-weight: 700;
  color: var(--couleur-texte);
  margin-bottom: 8px;
}

.ouverture-titre p {
  color: var(--couleur-texte-doux);
  font-size: 15px;
}

/* ─── PAQUET FERMÉ ───────────────────────────────── */

.paquet-attente {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 32px;
}

.paquet-visuel {
  position: relative;
  width: 160px;
  height: 200px;
  display: flex;
  align-items: center;
  justify-content: center;
}

.paquet-brillance {
  position: absolute;
  inset: -10px;
  border-radius: 24px;
  background: conic-gradient(from 0deg, #4f8ef7, #9c27b0, #ff9800, #4caf50, #4f8ef7);
  animation: rotation 3s linear infinite;
  opacity: 0.6;
  filter: blur(8px);
}

@keyframes rotation {
  from { transform: rotate(0deg); }
  to { transform: rotate(360deg); }
}

.paquet-contenu {
  position: relative;
  width: 140px;
  height: 180px;
  background: linear-gradient(135deg, #1e2140 0%, #2d3260 100%);
  border-radius: 16px;
  border: 2px solid rgba(255, 255, 255, 0.15);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 12px;
  animation: flotter 2s ease-in-out infinite;
  box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
}

@keyframes flotter {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-10px); }
}

.paquet-icone {
  font-size: 48px;
}

.paquet-sous-texte {
  font-size: 12px;
  color: var(--couleur-texte-doux);
}

.btn-ouvrir {
  padding: 16px 48px;
  background: linear-gradient(135deg, #4f8ef7, #7c4dff);
  color: white;
  border: none;
  border-radius: 50px;
  font-size: 18px;
  font-weight: 700;
  cursor: pointer;
  transition: transform 0.2s, box-shadow 0.2s;
  box-shadow: 0 8px 32px rgba(79, 142, 247, 0.4);
  letter-spacing: 0.5px;
}

.btn-ouvrir:hover {
  transform: translateY(-2px) scale(1.03);
  box-shadow: 0 12px 40px rgba(79, 142, 247, 0.6);
}

.btn-ouvrir:active {
  transform: scale(0.98);
}

/* ─── ANIMATION OUVERTURE ────────────────────────── */

.paquet-ouverture {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 20px;
}

.paquet-explosion {
  font-size: 80px;
  animation: explosion 0.8s ease-out;
}

@keyframes explosion {
  0% { transform: scale(0) rotate(-20deg); opacity: 0; }
  50% { transform: scale(1.4) rotate(10deg); }
  100% { transform: scale(1) rotate(0deg); opacity: 1; }
}

.paquet-ouverture-texte {
  color: var(--couleur-texte-doux);
  font-size: 16px;
}

/* ─── RÉVÉLATION DES CARTES ──────────────────────── */

.revelation-container {
  width: 100%;
  max-width: 1100px;
  position: relative;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 40px;
}

.cartes-revelation {
  display: flex;
  flex-wrap: wrap;
  gap: 20px;
  justify-content: center;
}

.carte-wrapper-flip {
  perspective: 1000px;
  width: 180px;
  aspect-ratio: 2 / 3;
  animation: apparaitre 0.4s ease-out both;
}

.carte-wrapper-flip.solo {
  width: 240px;
  animation: apparaitre-solo 0.4s ease-out both;
}

.carte-wrapper-flip.solo .carte-jeu {
  width: 100%;
  height: 100%;
  aspect-ratio: unset;
}

@keyframes apparaitre-solo {
  from { opacity: 0; transform: scale(0.9) translateY(20px); }
  to   { opacity: 1; transform: scale(1) translateY(0); }
}

@keyframes apparaitre {
  from { opacity: 0; transform: scale(0.8) translateY(20px); }
  to { opacity: 1; transform: scale(1) translateY(0); }
}

.carte-flip-inner {
  position: relative;
  width: 100%;
  height: 100%;
  transform-style: preserve-3d;
  transition: transform 0.7s cubic-bezier(0.175, 0.885, 0.32, 1.275);
}

.carte-wrapper-flip.retournee .carte-flip-inner {
  transform: rotateY(180deg);
}

.carte-flip-dos,
.carte-flip-face {
  position: absolute;
  inset: 0;
  backface-visibility: hidden;
  -webkit-backface-visibility: hidden;
}

.carte-flip-face {
  transform: rotateY(180deg);
}

.carte-revelation-wrapper {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 8px;
}

.rarete-badge-revelation {
  font-size: 13px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 1px;
  animation: fadeIn 0.4s ease-out;
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(4px); }
  to { opacity: 1; transform: translateY(0); }
}

/* ─── FIN D'OUVERTURE ────────────────────────────── */

.ouverture-fin {
  text-align: center;
  animation: fadeIn 0.5s ease-out;
}

.ouverture-fin-texte {
  font-size: 22px;
  font-weight: 600;
  margin-bottom: 20px;
  color: var(--couleur-texte);
}

.ouverture-fin-btns {
  display: flex;
  gap: 12px;
  justify-content: center;
  flex-wrap: wrap;
}

.btn-primaire {
  padding: 12px 28px;
  background: var(--couleur-accent);
  color: white;
  border: none;
  border-radius: 10px;
  font-size: 15px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s;
}

.btn-primaire:hover {
  background: var(--couleur-accent-hover);
  transform: translateY(-1px);
}

.btn-secondaire {
  padding: 12px 28px;
  background: transparent;
  color: var(--couleur-texte-doux);
  border: 1px solid rgba(255, 255, 255, 0.15);
  border-radius: 10px;
  font-size: 15px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s;
}

.btn-secondaire:hover {
  border-color: rgba(255, 255, 255, 0.3);
  color: var(--couleur-texte);
}

/* ─── CARTE DE JEU ───────────────────────────────── */

.carte-jeu {
  width: 180px;
  aspect-ratio: 2 / 3;
  border-radius: var(--rayon);
  display: flex;
  flex-direction: column;
  padding: 12px;
  position: relative;
  overflow: hidden;
  border: 1px solid rgba(255, 255, 255, 0.15);
  cursor: default;
  transition: transform 0.2s, box-shadow 0.2s;
}

.carte-jeu:hover {
  transform: translateY(-4px) scale(1.02);
}

.carte-jeu.dos {
  background: linear-gradient(135deg, #1e2140 0%, #2d3260 100%);
  align-items: center;
  justify-content: center;
}

.carte-dos-interieur {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 8px;
}

.carte-dos-logo {
  font-size: 36px;
}

.carte-dos-texte {
  font-size: 11px;
  color: var(--couleur-texte-doux);
  font-weight: 600;
  letter-spacing: 1px;
}

.carte-jeu.inconnue {
  background: var(--couleur-surface-2);
  align-items: center;
  justify-content: center;
  filter: grayscale(1);
  opacity: 0.5;
}

.carte-inconnue-interieur {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 8px;
}

.carte-inconnue-icone {
  font-size: 36px;
  color: var(--couleur-texte-doux);
  font-weight: 700;
}

.carte-inconnue-rarete {
  font-size: 11px;
  color: var(--couleur-texte-doux);
}

.carte-rarete-badge {
  font-size: 9px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.3px;
  margin-bottom: 6px;
  display: flex;
  align-items: center;
  gap: 4px;
  flex-wrap: nowrap;
  overflow: hidden;
  white-space: nowrap;
}

.carte-artwork {
  width: 100%;
  aspect-ratio: 16 / 9;
  border-radius: 8px;
  border: 2px solid;
  margin-bottom: 5px;
  overflow: hidden;
  position: relative;
  display: flex;
  align-items: center;
  justify-content: center;
}

/* ─── CATEGORY ARTWORK BACKGROUNDS ──────────────── */

.carte-artwork.categorie-historique {
  background:
    repeating-linear-gradient(45deg, rgba(201,168,76,0.07) 0px, rgba(201,168,76,0.07) 1px, transparent 1px, transparent 9px),
    repeating-linear-gradient(-45deg, rgba(201,168,76,0.04) 0px, rgba(201,168,76,0.04) 1px, transparent 1px, transparent 9px),
    linear-gradient(160deg, #1e1608 0%, #2a1f0e 60%, #1a1208 100%);
}

.carte-artwork.categorie-nature {
  background:
    radial-gradient(ellipse at 25% 75%, rgba(76,175,124,0.18) 0%, transparent 55%),
    radial-gradient(ellipse at 75% 25%, rgba(46,125,50,0.12) 0%, transparent 55%),
    radial-gradient(ellipse at 50% 50%, rgba(27,94,32,0.08) 0%, transparent 70%),
    linear-gradient(160deg, #071409 0%, #0d1f0f 60%, #091508 100%);
}

.carte-artwork.categorie-culture {
  background:
    radial-gradient(circle at 20% 60%, rgba(156,93,232,0.18) 0%, transparent 45%),
    radial-gradient(circle at 80% 40%, rgba(103,58,183,0.12) 0%, transparent 45%),
    repeating-linear-gradient(90deg, rgba(156,93,232,0.03) 0px, rgba(156,93,232,0.03) 1px, transparent 1px, transparent 22px),
    linear-gradient(160deg, #0e0a1f 0%, #160e2a 60%, #0a0818 100%);
}

.carte-artwork.categorie-sport {
  background:
    repeating-linear-gradient(135deg, rgba(232,124,62,0.08) 0px, rgba(232,124,62,0.08) 2px, transparent 2px, transparent 14px),
    radial-gradient(ellipse at 60% 40%, rgba(232,124,62,0.12) 0%, transparent 50%),
    linear-gradient(160deg, #1a0e05 0%, #221205 60%, #160c04 100%);
}

.carte-artwork.categorie-gastronomie {
  background:
    radial-gradient(circle at 30% 70%, rgba(196,75,43,0.15) 0%, transparent 45%),
    radial-gradient(circle at 70% 30%, rgba(140,50,20,0.1) 0%, transparent 45%),
    repeating-linear-gradient(0deg, rgba(196,75,43,0.04) 0px, rgba(196,75,43,0.04) 1px, transparent 1px, transparent 12px),
    linear-gradient(160deg, #1a0905 0%, #221108 60%, #180905 100%);
}

.carte-artwork-emoji {
  font-size: 48px;
  filter: drop-shadow(0 2px 12px rgba(0, 0, 0, 0.5));
  position: relative;
  z-index: 1;
}

.carte-artwork-skeleton {
  position: absolute;
  inset: 0;
  background: linear-gradient(90deg, rgba(255,255,255,0.04) 0%, rgba(255,255,255,0.12) 50%, rgba(255,255,255,0.04) 100%);
  background-size: 200% 100%;
  animation: shimmer 1.4s infinite;
}

@keyframes shimmer {
  0% { background-position: -200% 0; }
  100% { background-position: 200% 0; }
}

.carte-artwork-img {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
  opacity: 0;
  transition: opacity 0.4s ease;
  z-index: 2;
}

.carte-artwork-img.loaded {
  opacity: 1;
}

/* ─── EDITION STAMP ──────────────────────────────── */

.carte-edition {
  position: absolute;
  bottom: 4px;
  right: 6px;
  font-size: 8px;
  font-weight: 600;
  color: rgba(255, 255, 255, 0.45);
  letter-spacing: 0.5px;
  z-index: 3;
  pointer-events: none;
}

/* ─── CATEGORY BADGE ─────────────────────────────── */

.carte-categorie-badge {
  margin-left: auto;
  font-size: 11px;
  padding: 1px 4px;
  border-radius: 4px;
  border: 1px solid;
  line-height: 1;
}

/* ─── STAT BARS ──────────────────────────────────── */

.carte-stats {
  display: flex;
  flex-direction: column;
  gap: 2px;
  margin-top: 4px;
}

.carte-stat {
  display: flex;
  align-items: center;
  gap: 4px;
}

.carte-stat-label {
  font-size: 8px;
  color: var(--couleur-texte-doux);
  width: 56px;
  flex-shrink: 0;
  text-transform: uppercase;
  letter-spacing: 0.3px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.carte-stat-barre-fond {
  flex: 1;
  height: 3px;
  background: rgba(255, 255, 255, 0.08);
  border-radius: 2px;
  overflow: hidden;
}

.carte-stat-barre-valeur {
  height: 100%;
  border-radius: 2px;
  transition: width 0.4s ease;
}

/* ─── HOLOGRAPHIC FOIL ───────────────────────────── */

.carte-foil {
  position: absolute;
  inset: 0;
  border-radius: var(--rayon);
  pointer-events: none;
  z-index: 4;
  background: linear-gradient(
    125deg,
    transparent 30%,
    rgba(255, 255, 255, 0.04) 50%,
    transparent 70%
  );
  background-size: 200% 200%;
  animation: foil-sweep 5s linear infinite;
}

.carte-jeu.rare .carte-foil {
  background: linear-gradient(
    125deg,
    transparent 30%,
    rgba(100, 160, 255, 0.07) 50%,
    transparent 70%
  );
  background-size: 200% 200%;
}

.carte-jeu.legendaire .carte-foil {
  background: linear-gradient(
    125deg,
    transparent 15%,
    rgba(255, 200, 50, 0.1) 35%,
    rgba(255, 100, 50, 0.08) 55%,
    rgba(200, 100, 255, 0.06) 70%,
    transparent 85%
  );
  background-size: 200% 200%;
}

@keyframes foil-sweep {
  0%   { background-position: 200% 200%; }
  100% { background-position: -200% -200%; }
}

/* Mouse-tracking foil glow */
.carte-jeu.holo:hover .carte-foil {
  background: radial-gradient(
    circle at var(--px, 50%) var(--py, 50%),
    rgba(255, 255, 255, 0.12) 0%,
    transparent 60%
  ) !important;
  animation: none;
}

.carte-jeu.rare:hover .carte-foil {
  background: radial-gradient(
    circle at var(--px, 50%) var(--py, 50%),
    rgba(100, 160, 255, 0.22) 0%,
    rgba(100, 160, 255, 0.06) 40%,
    transparent 65%
  ) !important;
  animation: none;
}

.carte-jeu.legendaire:hover .carte-foil {
  background: radial-gradient(
    circle at var(--px, 50%) var(--py, 50%),
    rgba(255, 220, 80, 0.35) 0%,
    rgba(255, 100, 50, 0.15) 35%,
    rgba(200, 80, 255, 0.08) 55%,
    transparent 70%
  ) !important;
  animation: none;
}

.carte-info {
  display: flex;
  flex-direction: column;
  gap: 2px;
}

.carte-nom {
  font-size: 13px;
  font-weight: 700;
  line-height: 1.2;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.carte-lieu {
  font-size: 10px;
  color: var(--couleur-texte-doux);
  margin-bottom: 1px;
}

.carte-description {
  font-size: 10px;
  color: var(--couleur-texte-doux);
  line-height: 1.35;
  display: -webkit-box;
  -webkit-line-clamp: 4;
  -webkit-box-orient: vertical;
  overflow: hidden;
}

.carte-rarete-badge {
  display: flex;
  align-items: center;
  gap: 4px;
}

.carte-etoiles {
  display: inline-flex;
  gap: 1px;
  margin-left: 4px;
}

.etoile {
  font-size: 9px;
  color: rgba(255, 255, 255, 0.15);
}

.etoile.active {
  color: #ffd700;
  text-shadow: 0 0 6px rgba(255, 215, 0, 0.5);
}

/* ─── TRADE-UP ANIMATION ─────────────────────────── */

@keyframes tradeup {
  0%   { transform: scale(1) rotate(0deg); filter: brightness(1); }
  15%  { transform: scale(1.06) rotate(-3deg); filter: brightness(1.4); }
  35%  { transform: scale(1.12) rotate(3deg); filter: brightness(2); }
  55%  { transform: scale(1.08) rotate(-2deg); filter: brightness(1.6); }
  75%  { transform: scale(1.04) rotate(1deg); filter: brightness(1.2); }
  100% { transform: scale(1) rotate(0deg); filter: brightness(1); }
}

.carte-jeu.trading {
  animation: tradeup 0.65s ease-in-out;
  z-index: 10;
  position: relative;
}

/* ─── GOD MODE ───────────────────────────────────── */

.collection-page.god-mode-actif {
  outline: 2px solid rgba(255, 215, 0, 0.3);
  outline-offset: -2px;
}

.carte-jeu.god-mode-cible {
  cursor: pointer;
  opacity: 0.65;
  border: 1px dashed rgba(255, 215, 0, 0.5) !important;
  transition: opacity 0.2s, transform 0.2s, box-shadow 0.2s;
}

.carte-jeu.god-mode-cible:hover {
  opacity: 1;
  transform: translateY(-4px) scale(1.04);
  box-shadow: 0 0 20px rgba(255, 215, 0, 0.4) !important;
}

.carte-god-hint {
  font-size: 9px;
  color: #ffd700;
  margin-top: 6px;
  display: block;
  text-align: center;
}

/* Bouton God Mode dans la collection */
.collection-actions {
  display: flex;
  gap: 8px;
  align-items: center;
  flex-wrap: wrap;
}

.btn-god-mode {
  padding: 8px 16px;
  background: rgba(255, 215, 0, 0.08);
  color: #ffd700;
  border: 1px solid rgba(255, 215, 0, 0.25);
  border-radius: 8px;
  font-size: 13px;
  cursor: pointer;
  transition: all 0.2s;
  font-weight: 600;
}

.btn-god-mode:hover {
  background: rgba(255, 215, 0, 0.15);
}

.btn-god-mode.actif {
  background: rgba(255, 215, 0, 0.2);
  border-color: rgba(255, 215, 0, 0.6);
  box-shadow: 0 0 12px rgba(255, 215, 0, 0.2);
}

/* Badge ×N (duplicatas) */
.carte-quantite-badge {
  position: absolute;
  top: 8px;
  right: 8px;
  background: rgba(0, 0, 0, 0.55);
  color: #fff;
  font-size: 10px;
  font-weight: 700;
  padding: 2px 6px;
  border-radius: 10px;
  letter-spacing: 0.5px;
  backdrop-filter: blur(4px);
}

/* Bouton d'échange */
.carte-echange-btn {
  margin-top: 8px;
  width: 100%;
  padding: 5px 6px;
  background: rgba(255, 255, 255, 0.06);
  border: 1px solid;
  border-radius: 6px;
  font-size: 10px;
  font-weight: 700;
  cursor: pointer;
  text-align: center;
  transition: background 0.2s;

  overflow: hidden;

}

.carte-echange-btn:hover {
  background: rgba(255, 255, 255, 0.14);
}

.carte-echange-cible {
  font-weight: 600;
}

/* Grande carte (ouverture solo) */
/* Annonce rareté après révélation */
.rarete-annonce {
  font-size: 28px;
  font-weight: 800;
  letter-spacing: 2px;
  text-transform: uppercase;
  margin-bottom: 24px;

}

.deja-possedee-label {
  font-size: 14px;
  font-weight: 500;
  opacity: 0.7;
  letter-spacing: 0;
  text-transform: none;
}

/* Effet légendaire */
.carte-jeu.legendaire {
  animation: legendaire-glow 2s ease-in-out infinite;
}

@keyframes legendaire-glow {
  0%, 100% { box-shadow: 0 4px 20px rgba(191, 54, 12, 0.4), 0 0 40px rgba(255, 204, 2, 0.1); }
  50% { box-shadow: 0 4px 30px rgba(191, 54, 12, 0.7), 0 0 60px rgba(255, 204, 2, 0.25); }
}

/* ─── COLLECTION PAGE ────────────────────────────── */

.collection-page {
  padding: 24px;
  max-width: 1200px;
  margin: 0 auto;
  width: 100%;
}

.collection-entete {
  margin-bottom: 32px;
}

.collection-titre-row {

  align-items: center;
  justify-content: space-between;

  flex-wrap: wrap;
  gap: 12px;
}

.collection-titre-row h1 {
  font-size: 28px;
  font-weight: 700;
  color: var(--couleur-texte);
}

.btn-reset {
  padding: 8px 16px;
  background: rgba(244, 67, 54, 0.12);
  color: #ef5350;
  border: 1px solid rgba(244, 67, 54, 0.3);
  border-radius: 8px;

}

.btn-reset:hover {

  border-color: #b71c1c;

}

@keyframes pulse {

  50% { transform: scale(1.05); }
}

.progression-container {

  margin-bottom: 16px;

}

.progression-texte {
  display: flex;
  align-items: baseline;
  gap: 4px;

}

.progression-chiffre {

}

.progression-sur {
  font-size: 16px;
  color: var(--couleur-texte-doux);
}

.progression-barre {

}

.progression-remplissage {

}

.progression-pourcent {
  font-size: 12px;
  color: var(--couleur-texte-doux);

}

.filtres-rarete {

}

.filtre-btn {
  padding: 6px 14px;
  background: var(--couleur-surface);
  color: var(--couleur-texte-doux);
  border: 1px solid rgba(255, 255, 255, 0.1);
  border-radius: 20px;
  font-size: 13px;
  cursor: pointer;

}

.filtre-btn:hover {
  border-color: rgba(255, 255, 255, 0.25);
  color: var(--couleur-texte);
}

.filtre-btn.actif {
  background: rgba(255, 255, 255, 0.06);
  color: var(--couleur-texte);

}

.tri-lieux {
  display: flex;
  align-items: center;
  gap: 8px;
  flex-wrap: wrap;

}

.tri-label {

}

/* ─── SECTIONS DE LIEUX ──────────────────────────── */

.collection-lieux {
  display: flex;
  flex-direction: column;
  gap: 32px;
}

.collection-lieu-section {
  background: var(--couleur-surface);
  border-radius: var(--rayon-lg);

}

.collection-lieu-entete {
  display: flex;

  margin-bottom: 16px;

.collection-lieu-section.reduit .collection-lieu-entete {

}

.collection-lieu-chevron {

.collection-lieu-emoji {

}

.collection-lieu-nom {
  font-size: 18px;

.collection-lieu-statuts {

  align-items: center;

.badge-visite {
  font-size: 12px;

.badge-paquet-dispo {

.badge-cooldown {

.btn-bypass {

.collection-lieu-score {

  font-weight: 600;
  color: var(--couleur-texte-doux);
  background: var(--couleur-surface-2);

}

.collection-cartes-grille {

/* ─── RESPONSIVE (mobile-first) ──────────────────── */

@media (max-width: 640px) {
  /* Collection */
  .collection-page {
    padding: 16px;
  }

  .collection-titre-row h1 {
    font-size: 22px;
  }

  .collection-actions {
    gap: 6px;
  }

  .btn-god-mode,
  .btn-reset {

    grid-template-columns: repeat(auto-fill, 160px);
    gap: 10px;
  }

  .collection-cartes-grille .carte-jeu {

  }

  .collection-lieu-nom {

  }

  .ouverture-titre h1 {

  .btn-ouvrir {

  /* Map banner */
  .carte-info-banniere {

  .popup-contenu {

/* ─── GPS / GEOLOCALISATION ──────────────────────────── */

.gps-badge.ok { color: #66bb6a; }
.gps-badge.erreur { color: #ef6b6b; }

.gps-badge.god { color: #ffd740; }

.marqueur-joueur {

@keyframes pulse-joueur {

.popup-distance {

.popup-distance.loin {

/* ─── STATS / PROFIL ─────────────────────────────── */
.stats-page { padding: 24px; max-width: 760px; margin: 0 auto; width: 100%; }
.stats-entete { margin-bottom: 20px; }
.stats-entete h1 { font-size: 28px; font-weight: 700; }
.stats-depuis { font-size: 13px; color: var(--couleur-texte-doux); margin-top: 4px; }
.stats-cartes-cles { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 24px; }
.stat-carte { background: var(--couleur-surface); border: 1px solid rgba(255,255,255,0.06); border-radius: var(--rayon); padding: 16px 12px; text-align: center; }
.stat-valeur { font-size: 24px; font-weight: 800; color: var(--couleur-accent); line-height: 1.1; }
.stat-label { font-size: 11px; color: var(--couleur-texte-doux); margin-top: 6px; text-transform: uppercase; letter-spacing: 0.4px; }
.stats-bloc { background: var(--couleur-surface); border: 1px solid rgba(255,255,255,0.06); border-radius: var(--rayon-lg); padding: 20px; margin-bottom: 16px; }
.stats-bloc h2 { font-size: 16px; font-weight: 700; margin-bottom: 14px; }
.stats-ligne { display: flex; align-items: center; gap: 12px; margin-bottom: 10px; }
.stats-ligne:last-child { margin-bottom: 0; }
.stats-ligne-label { font-size: 13px; font-weight: 600; min-width: 110px; flex-shrink: 0; }
.stats-mini-barre { flex: 1; margin-bottom: 0; }
.stats-ligne-valeur { font-size: 13px; color: var(--couleur-texte-doux); min-width: 52px; text-align: right; flex-shrink: 0; font-variant-numeric: tabular-nums; }
.stats-legendaires { display: flex; flex-wrap: wrap; gap: 8px; }
.stats-legendaire-tag { font-size: 13px; background: rgba(255, 204, 51, 0.12); color: #ffcc33; border: 1px solid rgba(255, 204, 51, 0.3); padding: 4px 12px; border-radius: 20px; }
.stats-vide { font-size: 13px; color: var(--couleur-texte-doux); }
.stats-aide { font-size: 13px; color: var(--couleur-texte-doux); margin-bottom: 14px; line-height: 1.4; }
.stats-actions { display: flex; gap: 10px; flex-wrap: wrap; }
.stats-message { font-size: 13px; padding: 8px 12px; border-radius: 8px; background: rgba(124, 77, 255, 0.12); color: #b39ddb; margin-bottom: 12px; }
@media (max-width: 640px) {
  .stats-page { padding: 16px; }
  .stats-cartes-cles { grid-template-columns: repeat(2, 1fr); }

  .stats-actions .btn-primaire, .stats-actions .btn-secondaire { flex: 1; min-width: 130px; }
}


/* ─── OUVERTURE : animations & feedback ──────────── */
.paquet-secousse { font-size: 0; animation: secousse 0.5s ease-in-out infinite; }
.paquet-icone-grande { font-size: 72px; display: inline-block; }
@keyframes secousse {
  0%, 100% { transform: rotate(0deg) scale(1); }
  20% { transform: rotate(-8deg) scale(1.05); }
  40% { transform: rotate(7deg) scale(1.08); }
  60% { transform: rotate(-5deg) scale(1.05); }
  80% { transform: rotate(4deg) scale(1.03); }
}

/* Invitation à toucher la carte */
.carte-wrapper-flip.pulse-tap { animation: apparaitre-solo 0.4s ease-out both, tap-pulse 1.6s ease-in-out 0.4s infinite; }
@keyframes tap-pulse {
  0%, 100% { transform: scale(1) translateY(0); filter: brightness(1); }
  50% { transform: scale(1.03) translateY(-4px); filter: brightness(1.12); }
}
.tap-indice { font-size: 14px; color: var(--couleur-texte-doux); animation: fadeIn 0.5s ease-out; text-align: center; }

/* Halo derrière la carte révélée */
.revelation-halo {
  position: absolute; top: 0; left: 50%; transform: translateX(-50%);
  width: 320px; height: 460px; border-radius: 50%;
  filter: blur(60px); opacity: 0; pointer-events: none; z-index: 0;
  transition: opacity 0.8s ease;
}
.revelation-halo.actif { opacity: 0.75; }
.revelation-halo.rare { background: radial-gradient(circle, rgba(100,160,255,0.6), transparent 70%); }
.revelation-halo.legendaire { background: radial-gradient(circle, rgba(255,204,51,0.7), rgba(255,100,50,0.4) 50%, transparent 75%); animation: halo-pulse 2s ease-in-out infinite; }
@keyframes halo-pulse { 0%,100% { opacity: 0.55; } 50% { opacity: 0.9; } }

/* Rayons tournants pour les légendaires */
.revelation-rayons {
  position: absolute; top: -40px; left: 50%; transform: translateX(-50%);
  width: 500px; height: 500px; pointer-events: none; z-index: 0;
  background: repeating-conic-gradient(from 0deg, rgba(255,204,51,0.14) 0deg 8deg, transparent 8deg 22deg);

function distanceMetres(lat1, lon1, lat2, lon2) {
  const R = 6371000;
  const dLat = ((lat2 - lat1) * Math.PI) / 180;
  const dLon = ((lon2 - lon1) * Math.PI) / 180;
  const a = Math.sin(dLat / 2) ** 2 + Math.cos((lat1 * Math.PI) / 180) * Math.cos((lat2 * Math.PI) / 180) * Math.sin(dLon / 2) ** 2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
}
function formaterDistance(m) {
  if (m < 1000) return `${Math.round(m)}m`;
  return `${(m / 1000).toFixed(1)}km`;
}

// Artwork SVG généré procéduralement : aucun fichier, déterministe selon l'id.
// Motifs (rayons / anneaux / pluie d'étoiles) variant par catégorie & rareté.
function genererArtworkSVG(carte, lieu) {
  const categConfig = CATEGORIE_CONFIG[lieu?.categorie] ?? CATEGORIE_CONFIG.culture;
  const rarConfig = RARETE_CONFIG[carte.rarete] ?? RARETE_CONFIG.commun;
  const col = categConfig.couleur;
  const emoji = lieu?.emoji ?? '✨';
  const seed = hashInt(carte.id, 7) >>> 0;
  const rnd = (n) => { const x = Math.sin(seed * 9301 + n * 49297) * 233280; return x - Math.floor(x); };
  const W = 320, H = 180;

  // Fond dégradé sombre teinté de la catégorie
  let bg = `<defs>
    <radialGradient id="g${seed}" cx="50%" cy="42%" r="75%">
      <stop offset="0%" stop-color="${col}" stop-opacity="0.42"/>
      <stop offset="55%" stop-color="${col}" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#0a0c12" stop-opacity="0.95"/>
    </radialGradient>
  </defs>
  <rect width="${W}" height="${H}" fill="#0c0e15"/>
  <rect width="${W}" height="${H}" fill="url(#g${seed})"/>`;

  // Motifs selon catégorie
  let motif = '';
  const cat = lieu?.categorie ?? 'culture';
  if (cat === 'historique') {
    for (let i = 0; i < 6; i++) { const x = 20 + i * 50 + rnd(i) * 8; motif += `<rect x="${x}" y="${H - 30 - rnd(i+9) * 40}" width="22" height="60" fill="${col}" opacity="0.10"/>`; }
  } else if (cat === 'nature') {
    for (let i = 0; i < 7; i++) { const cx = rnd(i) * W, cy = rnd(i+3) * H; motif += `<circle cx="${cx}" cy="${cy}" r="${8 + rnd(i+5) * 26}" fill="${col}" opacity="0.08"/>`; }
  } else if (cat === 'sport') {
    for (let i = 0; i < 10; i++) { const y = i * 20; motif += `<line x1="0" y1="${y}" x2="${W}" y2="${y + 40}" stroke="${col}" stroke-width="3" opacity="0.07"/>`; }
  } else if (cat === 'gastronomie') {
    for (let i = 0; i < 9; i++) { motif += `<circle cx="${rnd(i) * W}" cy="${rnd(i+4) * H}" r="${4 + rnd(i+2) * 10}" fill="none" stroke="${col}" stroke-width="2" opacity="0.12"/>`; }
  } else { // culture
    for (let i = 0; i < 16; i++) { const a = (i / 16) * Math.PI * 2; motif += `<line x1="${W/2}" y1="${H/2}" x2="${W/2 + Math.cos(a) * 200}" y2="${H/2 + Math.sin(a) * 200}" stroke="${col}" stroke-width="1.5" opacity="0.06"/>`; }
  }

  // Halo de rareté : anneaux concentriques (plus nombreux et dorés pour légendaire)
  let halo = '';
  const ringCount = rarConfig.etoiles;
  const ringCol = carte.rarete === 'legendaire' ? '#ffcc33' : carte.rarete === 'rare' ? '#7fb2ff' : col;
  for (let i = 0; i < ringCount; i++) { halo += `<circle cx="${W/2}" cy="${H/2 - 6}" r="${30 + i * 16}" fill="none" stroke="${ringCol}" stroke-width="${carte.rarete === 'legendaire' ? 2 : 1.2}" opacity="${0.22 - i * 0.03}"/>`; }
  // Étincelles pour rare / légendaire
  let sparks = '';
  if (carte.rarete !== 'commun') {
    const n = carte.rarete === 'legendaire' ? 14 : 7;
    for (let i = 0; i < n; i++) { const x = rnd(i+20) * W, y = rnd(i+30) * H, s = 1 + rnd(i+40) * 2.5; sparks += `<circle cx="${x}" cy="${y}" r="${s}" fill="${ringCol}" opacity="${0.4 + rnd(i+50) * 0.4}"/>`; }
  }

  const svg = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 ${W} ${H}" preserveAspectRatio="xMidYMid slice">${bg}${motif}${halo}${sparks}<text x="${W/2}" y="${H/2}" text-anchor="middle" dominant-baseline="central" font-size="86" opacity="0.96">${emoji}</text></svg>`;
  return 'data:image/svg+xml;utf8,' + encodeURIComponent(svg);
}

// ===================== STOCKAGE LOCAL (IndexedDB) =====================
// Jeu 100% local : une seule sauvegarde, pas de compte ni de connexion.
const DB_NAME = 'culturego';
const DB_VERSION = 2;
const SAVE_KEY = 'local';
let db = null;
function openDB() {
  return new Promise((resolve, reject) => {
    if (db) { resolve(db); return; }
    const req = indexedDB.open(DB_NAME, DB_VERSION);
    req.onupgradeneeded = (e) => {
      const d = e.target.result;
      if (!d.objectStoreNames.contains('save')) d.createObjectStore('save', { keyPath: 'key' });
    };
    req.onsuccess = (e) => { db = e.target.result; resolve(db); };
    req.onerror = (e) => reject(e);
  });
}
async function dbGet(store, key) {
  const d = await openDB();
  return new Promise((resolve, reject) => {
    const tx = d.transaction(store, 'readonly');
    const req = tx.objectStore(store).get(key);
    req.onsuccess = () => resolve(req.result);
    req.onerror = reject;
  });
}
async function dbPut(store, value) {
  const d = await openDB();
  return new Promise((resolve, reject) => {
    const tx = d.transaction(store, 'readwrite');
    const req = tx.objectStore(store).put(value);
    req.onsuccess = () => resolve(req.result);
    req.onerror = reject;
  });
}
async function loadData() {
  const s = await dbGet('save', SAVE_KEY);
  if (!s) return { cartesPossedees: {}, lieuxVisites: [], dernieresOuvertures: {}, premiereOuverture: null };
  return {
    cartesPossedees: s.cartesPossedees || {},
    lieuxVisites: s.lieuxVisites || [],
    dernieresOuvertures: s.dernieresOuvertures || {},
    premiereOuverture: s.premiereOuverture || null,
  };
}
async function saveData(data) {
  await dbPut('save', { key: SAVE_KEY, ...data });
}

  const cartesUniquesSerie = filtreSerie === 'toutes' ? nbCartesUniques : lieuxSerie.flatMap(l => l.cartes).filter(c => possede(c.id)).length;
  const progression = Math.round((cartesUniquesSerie / totalCartes) * 100);

  function handleReset() { if (confirmerReset) { reinitialiser(); setConfirmerReset(false); } else { setConfirmerReset(true); setTimeout(() => setConfirmerReset(false), 4000); } }
  function handleEchange(carteId, carteSupId) { if (tradingId) return; setTradingId(carteId); setTimeout(() => { echangerCartes(carteId, carteSupId); setTradingId(null); }, 650); }
  function toggleLieu(lieuId) { setLieuxReduits(prev => ({ ...prev, [lieuId]: !prev[lieuId] })); }

  const lieuxTries = [...LIEUX].sort((a, b) => {
    if (triOrdre === 'alphabetique') return a.nom.localeCompare(b.nom, 'fr');
    const aV = lieuxVisites.includes(a.id), bV = lieuxVisites.includes(b.id);
    if (aV && !bV) return -1; if (!aV && bV) return 1;
    if (aV && bV) return (dernieresOuvertures[b.id] ?? 0) - (dernieresOuvertures[a.id] ?? 0);
    return 0;
  });

  const filtreOpts = [{ val: 'tous', label: 'Tous' }, { val: 'visite', label: '✅ Visités' }, { val: 'non-visite', label: '🗺️ Non visités' }];

  return e('div', { className: `collection-page${godMode ? ' god-mode-actif' : ''}` },
    e('div', { className: 'collection-entete' },
      e('div', { className: 'collection-titre-row' }, e('h1', null, 'Ma Collection'), e('div', { className: 'collection-actions' }, e('button', { className: `btn-reset ${confirmerReset ? 'confirmer' : ''}`, onClick: handleReset }, confirmerReset ? '⚠️ Confirmer ?' : '🔄 Réinitialiser'))),
      e('div', { className: 'progression-container' },
        e('div', { className: 'progression-texte' }, e('span', { className: 'progression-chiffre' }, cartesUniquesSerie), e('span', { className: 'progression-sur' }, ` / ${totalCartes} cartes${filtreSerie !== 'toutes' ? ` — ${filtreSerie}` : ' collectées'}`)),
        e('div', { className: 'progression-barre' }, e('div', { className: 'progression-remplissage', style: { width: `${progression}%` } })),
        e('div', { className: 'progression-pourcent' }, `${progression}%`)
      ),
      SERIES_COL.length >= 2 && e('div', { className: 'tri-lieux' }, e('span', { className: 'tri-label' }, 'Série'), ...SERIES_COL.map(s => e('button', { key: s, className: `filtre-btn ${filtreSerie === s ? 'actif' : ''}`, onClick: () => setFiltreSerie(s) }, s === 'toutes' ? 'Toutes' : s))),
      e('div', { className: 'tri-lieux' }, e('span', { className: 'tri-label' }, 'Lieux'), ...filtreOpts.map(opt => e('button', { key: opt.val, className: `filtre-btn ${filtreVisite === opt.val ? 'actif' : ''}`, onClick: () => setFiltreVisite(opt.val) }, opt.label))),
      e('div', { className: 'tri-lieux' }, e('span', { className: 'tri-label' }, 'Trier par'), e('button', { className: `filtre-btn ${triOrdre === 'recent' ? 'actif' : ''}`, onClick: () => setTriOrdre('recent') }, '🕐 Récemment visité'), e('button', { className: `filtre-btn ${triOrdre === 'alphabetique' ? 'actif' : ''}`, onClick: () => setTriOrdre('alphabetique') }, '🔤 Alphabétique'))
    ),
    e('div', { className: 'collection-lieux' },
      ...lieuxTries.filter(lieu => {
        if (filtreSerie !== 'toutes' && lieu.serie !== filtreSerie) return false;
        if (filtreVisite === 'visite') return lieuxVisites.includes(lieu.id);
        if (filtreVisite === 'non-visite') return !lieuxVisites.includes(lieu.id);
        return true;
      }).map(lieu => {
        const visite = lieuxVisites.includes(lieu.id), peutOuvrirPaquet = peutOuvrir(lieu.id), tempsRestant = tempsAvantProchainPaquet(lieu.id);
        const nbPossedeesLieu = lieu.cartes.filter(c => possede(c.id)).length;
        const reduit = lieu.id in lieuxReduits ? lieuxReduits[lieu.id] : !visite;
        return e('div', { key: lieu.id, className: `collection-lieu-section${reduit ? ' reduit' : ''}` },
          e('div', { className: 'collection-lieu-entete', onClick: () => toggleLieu(lieu.id), role: 'button', style: { cursor: 'pointer' } },
            e('span', { className: 'collection-lieu-emoji' }, lieu.emoji),
            e('h2', { className: 'collection-lieu-nom' }, lieu.nom),
            e('div', { className: 'collection-lieu-statuts' },
              visite ? e('span', { className: 'badge-visite' }, '✅ Visité') : e('span', { className: 'badge-non-visite' }, '🗺️ Non visité'),
              visite && peutOuvrirPaquet && e('button', { className: 'badge-paquet-dispo', onClick: (ev) => { ev.stopPropagation(); setOuvertureId(lieu.id); setPage('ouverture'); } }, '🎁 Paquet disponible'),
              visite && !peutOuvrirPaquet && e('span', { className: 'badge-cooldown' }, `⏳ ${formaterTimer(tempsRestant)}`, e('button', { className: 'btn-bypass', onClick: (ev) => { ev.stopPropagation(); reinitialiserOuvertureLieu(lieu.id); }, title: 'Bypass le minuteur (mode démo)' }, '⚡ Skip'))
            ),
            e('span', { className: 'collection-lieu-score' }, `${nbPossedeesLieu}/${lieu.cartes.length}`),
            e('span', { className: 'collection-lieu-chevron' }, reduit ? '▶' : '▼')
          ),
          !reduit && e('div', { className: 'collection-cartes-grille' },
            ...lieu.cartes.map(carte => {
              const carteSuperieure = getCarteSuperieure(carte, lieu);
              const estPossedee = possede(carte.id);
              return e(CarteJeu, { key: carte.id, carte, lieu, possedee: estPossedee, retournee: true, quantite: quantite(carte.id), carteSuperieure, trading: tradingId === carte.id, onEchanger: carteSuperieure && tradingId === null ? () => handleEchange(carte.id, carteSuperieure.id) : null, onGodModeClick: godMode && !estPossedee ? () => ajouterCartes([carte.id]) : null });
            })
          )
        );
      })
    )
  );
}

// ===================== STATISTIQUES / PROFIL =====================
function StatistiquesPage() {
  const { cartesPossedees, nbCartesUniques, lieuxVisites, premiereOuverture, reinitialiser } = useContext(CollectionContext);
  const { setPage } = useContext(NavContext);
  const fileInputRef = useRef(null);
  const [message, setMessage] = useState(null);
  const [confirmReset, setConfirmReset] = useState(false);

  const totalCartes = NOMBRE_TOTAL_CARTES;
  const pourcent = totalCartes ? Math.round((nbCartesUniques / totalCartes) * 100) : 0;
  const totalDoubles = Object.values(cartesPossedees).reduce((s, q) => s + Math.max(0, q - 1), 0);

  // Progression par série
  const parSerie = SERIES_MAP.map(serie => {
    const cartesSerie = TOUTES_LES_CARTES.filter(c => c.serie === serie);
    const possedees = cartesSerie.filter(c => (cartesPossedees[c.id] ?? 0) > 0).length;
    return { serie, total: cartesSerie.length, possedees };
  });

  // Progression par rareté
  const parRarete = ORDRE_RARETE_COL.map(rarete => {
    const cartesRar = TOUTES_LES_CARTES.filter(c => c.rarete === rarete);
    const possedees = cartesRar.filter(c => (cartesPossedees[c.id] ?? 0) > 0).length;
    return { rarete, label: RARETE_CONFIG[rarete].label, couleur: RARETE_CONFIG[rarete].couleur, total: cartesRar.length, possedees };
  });

  // Cartes les plus rares possédées
  const legendairesPossedees = TOUTES_LES_CARTES.filter(c => c.rarete === 'legendaire' && (cartesPossedees[c.id] ?? 0) > 0);

  function flash(txt) { setMessage(txt); setTimeout(() => setMessage(null), 3000); }

  function exporter() {
    const data = { version: 2, app: 'culturego', exporte: new Date().toISOString(), cartesPossedees, lieuxVisites, premiereOuverture };
    const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `culturego-collection-${new Date().toISOString().slice(0, 10)}.json`;
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    URL.revokeObjectURL(url);
    flash('✅ Collection exportée');
  }

  function importer(ev) {
    const file = ev.target.files?.[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = () => {
      try {
        const data = JSON.parse(reader.result);
        if (!data || typeof data.cartesPossedees !== 'object') throw new Error('format');
        saveData({
          cartesPossedees: data.cartesPossedees || {},
          lieuxVisites: Array.isArray(data.lieuxVisites) ? data.lieuxVisites : [],
          dernieresOuvertures: {},
          premiereOuverture: data.premiereOuverture || null,
        }).then(() => { flash('✅ Import réussi — rechargement…'); setTimeout(() => location.reload(), 900); });
      } catch (err) { flash('❌ Fichier invalide'); }
    };
    reader.readAsText(file);
    ev.target.value = '';
  }

  function handleReset() {
    if (!confirmReset) { setConfirmReset(true); setTimeout(() => setConfirmReset(false), 4000); return; }
    reinitialiser(); setConfirmReset(false); flash('Collection réinitialisée');
  }

  return e('div', { className: 'stats-page' },
    e('div', { className: 'stats-entete' },
      e('h1', null, '📊 Profil joueur'),
      premiereOuverture && e('p', { className: 'stats-depuis' }, `Joue depuis le ${new Date(premiereOuverture).toLocaleDateString('fr-CH', { day: 'numeric', month: 'long', year: 'numeric' })}`)
    ),

    // Cartes clés
    e('div', { className: 'stats-cartes-cles' },
      e('div', { className: 'stat-carte' }, e('div', { className: 'stat-valeur' }, `${nbCartesUniques}/${totalCartes}`), e('div', { className: 'stat-label' }, 'Cartes uniques')),
      e('div', { className: 'stat-carte' }, e('div', { className: 'stat-valeur', style: { color: '#7c4dff' } }, `${pourcent}%`), e('div', { className: 'stat-label' }, 'Complétion')),
      e('div', { className: 'stat-carte' }, e('div', { className: 'stat-valeur', style: { color: '#66bb6a' } }, `${lieuxVisites.length}/${LIEUX.length}`), e('div', { className: 'stat-label' }, 'Lieux visités')),
      e('div', { className: 'stat-carte' }, e('div', { className: 'stat-valeur', style: { color: '#ffb74d' } }, totalDoubles), e('div', { className: 'stat-label' }, 'Doublons'))
    ),

    // Progression globale
    e('div', { className: 'stats-bloc' },
      e('h2', null, 'Complétion globale'),
      e('div', { className: 'progression-barre' }, e('div', { className: 'progression-remplissage', style: { width: `${pourcent}%` } })),
      e('div', { className: 'progression-pourcent' }, `${nbCartesUniques} sur ${totalCartes} cartes`)
    ),

    // Par rareté
    e('div', { className: 'stats-bloc' },
      e('h2', null, 'Par rareté'),
      ...parRarete.map(({ rarete, label, couleur, total, possedees }) =>
        e('div', { key: rarete, className: 'stats-ligne' },
          e('span', { className: 'stats-ligne-label', style: { color: couleur } }, label),
          e('div', { className: 'progression-barre stats-mini-barre' }, e('div', { className: 'progression-remplissage', style: { width: `${total ? (possedees / total) * 100 : 0}%`, background: couleur } })),
          e('span', { className: 'stats-ligne-valeur' }, `${possedees}/${total}`)
        )
      )
    ),

    // Par série
    SERIES_MAP.length >= 1 && e('div', { className: 'stats-bloc' },
      e('h2', null, 'Par série'),
      ...parSerie.map(({ serie, total, possedees }) =>
        e('div', { key: serie, className: 'stats-ligne' },
          e('span', { className: 'stats-ligne-label' }, serie),
          e('div', { className: 'progression-barre stats-mini-barre' }, e('div', { className: 'progression-remplissage', style: { width: `${total ? (possedees / total) * 100 : 0}%` } })),
          e('span', { className: 'stats-ligne-valeur' }, `${possedees}/${total}`)
        )
      )
    ),

    // Légendaires
    e('div', { className: 'stats-bloc' },
      e('h2', null, `🌟 Légendaires (${legendairesPossedees.length})`),
      legendairesPossedees.length === 0
        ? e('p', { className: 'stats-vide' }, 'Aucune carte légendaire pour le moment. Continue d\'ouvrir des paquets !')
        : e('div', { className: 'stats-legendaires' }, ...legendairesPossedees.map(c => {
            const lieu = LIEUX.find(l => l.cartes.some(x => x.id === c.id));
            return e('span', { key: c.id, className: 'stats-legendaire-tag' }, `${lieu?.emoji ?? '✨'} ${c.nom}`);
          }))
    ),

    // Sauvegarde / partage
    e('div', { className: 'stats-bloc' },
      e('h2', null, '💾 Sauvegarde & partage'),
      e('p', { className: 'stats-aide' }, 'Exporte ta collection en fichier JSON pour la sauvegarder ou la transférer sur un autre appareil.'),
      message && e('div', { className: 'stats-message' }, message),
      e('div', { className: 'stats-actions' },
        e('button', { className: 'btn-primaire', onClick: exporter }, '⬇️ Exporter'),
        e('button', { className: 'btn-secondaire', onClick: () => fileInputRef.current?.click() }, '⬆️ Importer'),
        e('input', { ref: fileInputRef, type: 'file', accept: 'application/json,.json', style: { display: 'none' }, onChange: importer })
      ),
      e('button', { className: `btn-reset ${confirmReset ? 'confirmer' : ''}`, style: { marginTop: '12px' }, onClick: handleReset }, confirmReset ? '⚠️ Confirmer la réinitialisation' : '🗑️ Réinitialiser ma collection')
    )
  );
}

// ===================== MAIN APP =====================
function App() {
  const [chargement, setChargement] = useState(true);
  const [godMode, setGodMode] = useState(false);
  const [page, setPage] = useState('carte');
  const [ouvertureId, setOuvertureId] = useState(null);
  const [cartesPossedees, setCartesPossedees] = useState({});
  const [lieuxVisites, setLieuxVisites] = useState([]);
  const [dernieresOuvertures, setDernieresOuvertures] = useState({});
  const [premiereOuverture, setPremiereOuverture] = useState(null);
  const loaded = useRef(false);
  const syncTimer = useRef(null);

  useEffect(() => {
    loadData().then(data => {
      setCartesPossedees(data.cartesPossedees);
      setLieuxVisites(data.lieuxVisites);
      setDernieresOuvertures(data.dernieresOuvertures);
      setPremiereOuverture(data.premiereOuverture);
      loaded.current = true;
      setChargement(false);
    });
  }, []);

  useEffect(() => {
    if (!loaded.current) return;
    clearTimeout(syncTimer.current);
    syncTimer.current = setTimeout(() => {
      saveData({ cartesPossedees, lieuxVisites, dernieresOuvertures, premiereOuverture });
    }, 600);
    return () => clearTimeout(syncTimer.current);
  }, [cartesPossedees, lieuxVisites, dernieresOuvertures, premiereOuverture]);

  const ajouterCartes = useCallback((ids) => { setCartesPossedees(prev => { const u = {...prev}; for (const id of ids) u[id] = (u[id] ?? 0) + 1; return u; }); }, []);
  const visiterLieu = useCallback((lieuId) => { setLieuxVisites(prev => prev.includes(lieuId) ? prev : [...prev, lieuId]); }, []);
  const enregistrerOuverture = useCallback((lieuId) => {
    setDernieresOuvertures(prev => ({ ...prev, [lieuId]: Date.now() }));
    setPremiereOuverture(prev => prev ?? Date.now());
  }, []);
  const peutOuvrir = useCallback((lieuId) => { if (!lieuxVisites.includes(lieuId)) return false; const d = dernieresOuvertures[lieuId]; if (!d) return true; return Date.now() - d > 24 * 60 * 60 * 1000; }, [lieuxVisites, dernieresOuvertures]);
  const tempsAvantProchainPaquet = useCallback((lieuId) => { const d = dernieresOuvertures[lieuId]; if (!d) return 0; return Math.max(0, 24 * 60 * 60 * 1000 - (Date.now() - d)); }, [dernieresOuvertures]);
  const reinitialiser = useCallback(() => { setCartesPossedees({}); setLieuxVisites([]); setDernieresOuvertures({}); setPremiereOuverture(null); }, []);
  const reinitialiserOuvertureLieu = useCallback((lieuId) => { setDernieresOuvertures(prev => { const u = {...prev}; delete u[lieuId]; return u; }); }, []);
  const possede = useCallback((id) => (cartesPossedees[id] ?? 0) > 0, [cartesPossedees]);
  const quantite = useCallback((id) => cartesPossedees[id] ?? 0, [cartesPossedees]);
  const echangerCartes = useCallback((src, cible) => { setCartesPossedees(prev => { if ((prev[src] ?? 0) < 2) return prev; const u = {...prev}; u[src] -= 2; if (u[src] <= 0) delete u[src]; u[cible] = (u[cible] ?? 0) + 1; return u; }); }, []);
  const nbCartesUniques = Object.values(cartesPossedees).filter(q => q > 0).length;

  if (chargement) return e('div', { style: { display: 'flex', alignItems: 'center', justifyContent: 'center', height: '100vh', background: '#0f1117', color: '#e8eaf0', fontSize: '18px' } }, 'Chargement…');

  const collectionValue = { cartesPossedees, nbCartesUniques, lieuxVisites, dernieresOuvertures, premiereOuverture, ajouterCartes, visiterLieu, enregistrerOuverture, peutOuvrir, tempsAvantProchainPaquet, reinitialiser, reinitialiserOuvertureLieu, possede, quantite, echangerCartes, godMode };
  const navValue = { page, setPage, ouvertureId, setOuvertureId };

  return e(NavContext.Provider, { value: navValue }, e(CollectionContext.Provider, { value: collectionValue },
    e('div', { className: 'app' },
      e(Navigation, { godMode, setGodMode }),
      e('main', { className: 'app-contenu' },
        page === 'carte' && e(CartePage),
        page === 'collection' && e(CollectionPage),
        page === 'statistiques' && e(StatistiquesPage),
        page === 'ouverture' && e(OuverturePage)
      ),
      e(BottomNav)
    )
  ));
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(e(App));
</script>
</body>
